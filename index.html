<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 歲生日快樂！</title>
    <style>
        /* 加入漸層背景，更有儀式感 */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); 
            font-family: "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            overflow: hidden;
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 2.5rem; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            max-width: 85%; 
            animation: fadeIn 1.5s ease; /* 漸入動畫 */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        button { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 18px 35px; 
            border-radius: 50px; 
            font-size: 1.3rem; 
            font-weight: bold;
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: 0.3s; 
        }
        button:hover { transform: scale(1.05); background: #ff6b81; }
        #content { display: none; }
        h1 { color: #ff4757; margin-bottom: 1rem; }
        p { line-height: 1.8; color: #444; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button onclick="startExperience()">點擊開啟 20 年的驚喜 🎁</button>
    </div>

    <div id="content" class="card">
        <h1>Happy 30th Birthday!</h1>
        <p>從國小的課桌椅，<br>到 30 歲的慶生餐桌。</p>
        <p>感謝這 20 年的歲月裡有你同行。<br>祝你生日快樂，平安順心！</p>
        <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">🎶 音樂播放中...</p>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startExperience() {
            var audio = document.getElementById('bgMusic');
            // 先載入並播放音樂
            audio.load();
            audio.play().catch(function(error) {
                console.log("播放失敗，可能是檔案路徑問題或格式不符");
            });

            // 切換畫面
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }
    </script>
</body>
</html>
