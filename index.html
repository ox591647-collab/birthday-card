<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快樂！</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; font-family: sans-serif; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 80%; }
        button { background: #ff4757; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.1); }
        #content { display: none; }
        h1 { color: #ff4757; }
        p { line-height: 1.6; color: #555; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button onclick="startExperience()">點擊開啟 20 年的驚喜 🎁</button>
    </div>

    <div id="content" class="card">
        <h1>Happy 30th Birthday!</h1>
        <p>從國小的課桌椅，到 30 歲的慶生餐桌。<br>感謝這 20 年的歲月裡有你同行。</p>
        <p>祝你 30 歲生日快樂，平安順心！</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            var audio = document.getElementById('bgMusic');
            audio.play();
        }
    </script>
</body>
</html>
